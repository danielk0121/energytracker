<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnergyTracker Prototype</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; line-height: 1.6; color: #333; background-color: #f0f2f5; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 30px; }
        h3 { margin-top: 0; color: #202124; border-bottom: 2px solid #f1f3f4; padding-bottom: 10px; margin-bottom: 15px; }
        
        /* 업로드 섹션 */
        .upload-section { text-align: center; border: 2px dashed #dadce0; background-color: #f8f9fa; }
        input[type="file"] { display: block; width: 100%; margin: 15px 0; }
        button { background-color: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 500; transition: background-color 0.2s; }
        button:hover { background-color: #1765cc; }
        
        /* 차트 래퍼 및 y축 */
        .chart-wrapper { display: flex; height: 280px; background: #fafafa; border-radius: 8px; padding: 10px 10px 0 10px; position: relative; margin-bottom: 10px; }
        .y-axis { display: flex; flex-direction: column-reverse; justify-content: space-between; width: 55px; padding-bottom: 50px; border-right: 1px solid #eee; font-size: 10px; color: #70757a; text-align: right; padding-right: 8px; box-sizing: border-box; }
        .chart-container { flex: 1; display: flex; align-items: flex-end; gap: 8px; padding-bottom: 50px; overflow-x: auto; overflow-y: hidden; position: relative; scroll-behavior: smooth; }
        
        /* 그리드 라인 */
        .grid-line { position: absolute; left: 0; right: 0; border-top: 1px dashed #eee; z-index: 0; pointer-events: none; }

        .bar { background-color: #4285f4; border-radius: 4px 4px 0 0; min-width: 16px; position: relative; cursor: pointer; z-index: 1; transition: transform 0.2s; }
        .bar:hover { background-color: #1a73e8; transform: scaleY(1.02); }
        .bar-label { position: absolute; bottom: -42px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #70757a; white-space: nowrap; text-align: center; line-height: 1.2; }
        
        /* 최소/최대 강조 */
        .bar.max { background-color: #ea4335; }
        .bar.min { background-color: #fbbc05; }
        .value-label { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: bold; white-space: nowrap; }
        .bar.max .value-label { color: #ea4335; }
        .bar.min .value-label { color: #f29900; }

        .monthly .bar { background-color: #34a853; min-width: 50px; }
        .monthly .bar.max { background-color: #ea4335; }
        .monthly .bar.min { background-color: #fbbc05; }
        
        /* 탭 스타일 */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #f1f3f4; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; padding: 8px 16px; cursor: pointer; font-size: 14px; font-weight: 600; color: #5f6368; border-radius: 20px; transition: all 0.2s; width: auto; }
        .tab-btn.active { background-color: #e8f0fe; color: #1a73e8; }
        .tab-btn:hover:not(.active) { background-color: #f1f3f4; }

        /* 데이터 목록 */
        .data-list { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .data-list th, .data-list td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f3f4; }
        .data-list th { background-color: #f8f9fa; font-weight: 600; color: #5f6368; }
        .data-list tr:hover { background-color: #f1f3f4; }
        .usage-val { font-weight: bold; color: #1a73e8; }

        /* 분석 결과 섹션 */
        #analysis-results { display: none; margin-top: 15px; padding: 10px; background: #e8f0fe; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>
    <div style="background-color: #fff3cd; color: #856404; padding: 10px; text-align: center; font-size: 14px; border-bottom: 1px solid #ffeeba; margin-bottom: 20px;">
        ⚠️ 현재 샘플 데이터를 사용 중입니다. 추후 기능이 수정될 예정입니다.
    </div>
    <h1>EnergyTracker</h1>

    <!-- 1. 사진 업로드 섹션 (다중 선택 가능) -->
    <div class="card upload-section">
        <h3>1. 월패드 사진 업로드</h3>
        <p style="font-size: 14px; color: #5f6368;">분석할 사진을 여러 장 선택할 수 있습니다.</p>
        <input type="file" id="photo-input" accept="image/*" multiple>
        <button id="analyze-btn">사진 분석 시작</button>
        <div id="analysis-results"></div>
    </div>

    <!-- 2. 월별 사용량 차트 -->
    <div class="card">
        <h3>월별 사용량 (최근 4개월)</h3>
        <div class="chart-wrapper">
            <div id="monthly-y-axis" class="y-axis"></div>
            <div id="monthly-chart" class="chart-container monthly"></div>
        </div>
    </div>

    <!-- 3. 일자별 사용량 차트 -->
    <div class="card">
        <h3>일자별 사용량 (최근 30일)</h3>
        <div class="chart-wrapper">
            <div id="daily-y-axis" class="y-axis"></div>
            <div id="daily-chart" class="chart-container"></div>
        </div>
    </div>

    <!-- 4. 상세 사용 기록 (탭 적용) -->
    <div class="card">
        <h3>상세 사용 기록</h3>
        <div class="tabs">
            <button id="tab-monthly" class="tab-btn active" onclick="switchTab('monthly')">월별 목록</button>
            <button id="tab-daily" class="tab-btn" onclick="switchTab('daily')">일자별 목록</button>
        </div>
        <table class="data-list">
            <thead>
                <tr id="list-header">
                    <th>월</th>
                    <th>총 사용량 (kWh)</th>
                </tr>
            </thead>
            <tbody id="usage-list-body">
                <!-- 목록이 여기에 생성됩니다 -->
            </tbody>
        </table>
    </div>

    <script>
        // --- 1. 데이터 생성 및 관리 ---
        
        const FIXED_DATA = [
            { "date": "2025-12-02", "usage": 9.2 }, { "date": "2025-12-03", "usage": 8.1 }, { "date": "2025-12-04", "usage": 7.5 }, { "date": "2025-12-05", "usage": 10.4 }, { "date": "2025-12-06", "usage": 11.8 }, { "date": "2025-12-07", "usage": 6.7 }, { "date": "2025-12-08", "usage": 8.3 }, { "date": "2025-12-09", "usage": 9.5 }, { "date": "2025-12-10", "usage": 7.1 }, { "date": "2025-12-11", "usage": 8.8 },
            { "date": "2025-12-12", "usage": 10.2 }, { "date": "2025-12-13", "usage": 12.5 }, { "date": "2025-12-14", "usage": 9.1 }, { "date": "2025-12-15", "usage": 7.4 }, { "date": "2025-12-16", "usage": 6.9 }, { "date": "2025-12-17", "usage": 8.6 }, { "date": "2025-12-18", "usage": 11.3 }, { "date": "2025-12-19", "usage": 10.1 }, { "date": "2025-12-20", "usage": 7.7 }, { "date": "2025-12-21", "usage": 5.8 },
            { "date": "2025-12-22", "usage": 9.4 }, { "date": "2025-12-23", "usage": 8.7 }, { "date": "2025-12-24", "usage": 12.2 }, { "date": "2025-12-25", "usage": 13.5 }, { "date": "2025-12-26", "usage": 11.1 }, { "date": "2025-12-27", "usage": 8.9 }, { "date": "2025-12-28", "usage": 10.4 }, { "date": "2025-12-29", "usage": 7.3 }, { "date": "2025-12-30", "usage": 9.6 }, { "date": "2025-12-31", "usage": 11.2 },
            { "date": "2026-01-01", "usage": 8.5 }, { "date": "2026-01-02", "usage": 7.2 }, { "date": "2026-01-03", "usage": 9.8 }, { "date": "2026-01-04", "usage": 10.5 }, { "date": "2026-01-05", "usage": 6.4 }, { "date": "2026-01-06", "usage": 8.1 }, { "date": "2026-01-07", "usage": 9.3 }, { "date": "2026-01-08", "usage": 7.7 }, { "date": "2026-01-09", "usage": 11.4 }, { "date": "2026-01-10", "usage": 12.8 },
            { "date": "2026-01-11", "usage": 9.1 }, { "date": "2026-01-12", "usage": 8.3 }, { "date": "2026-01-13", "usage": 10.6 }, { "date": "2026-01-14", "usage": 7.5 }, { "date": "2026-01-15", "usage": 6.8 }, { "date": "2026-01-16", "usage": 9.2 }, { "date": "2026-01-17", "usage": 11.7 }, { "date": "2026-01-18", "usage": 8.4 }, { "date": "2026-01-19", "usage": 7.9 }, { "date": "2026-01-20", "usage": 10.1 },
            { "date": "2026-01-21", "usage": 11.5 }, { "date": "2026-01-22", "usage": 9.3 }, { "date": "2026-01-23", "usage": 8.7 }, { "date": "2026-01-24", "usage": 12.1 }, { "date": "2026-01-25", "usage": 10.8 }, { "date": "2026-01-26", "usage": 7.6 }, { "date": "2026-01-27", "usage": 6.5 }, { "date": "2026-01-28", "usage": 9.4 }, { "date": "2026-01-29", "usage": 8.2 }, { "date": "2026-01-30", "usage": 11.1 },
            { "date": "2026-01-31", "usage": 10.3 }, { "date": "2026-02-01", "usage": 8.2 }, { "date": "2026-02-02", "usage": 7.5 }, { "date": "2026-02-03", "usage": 9.1 }, { "date": "2026-02-04", "usage": 6.8 }, { "date": "2026-02-05", "usage": 10.4 }, { "date": "2026-02-06", "usage": 5.9 }, { "date": "2026-02-07", "usage": 8.7 }, { "date": "2026-02-08", "usage": 11.2 }, { "date": "2026-02-09", "usage": 7.3 },
            { "date": "2026-02-10", "usage": 6.5 }, { "date": "2026-02-11", "usage": 9.8 }, { "date": "2026-02-12", "usage": 8.1 }, { "date": "2026-02-13", "usage": 10.6 }, { "date": "2026-02-14", "usage": 12.1 }, { "date": "2026-02-15", "usage": 7.8 }, { "date": "2026-02-16", "usage": 6.2 }, { "date": "2026-02-17", "usage": 9.4 }, { "date": "2026-02-18", "usage": 8.5 }, { "date": "2026-02-19", "usage": 11.7 },
            { "date": "2026-02-20", "usage": 10.1 }, { "date": "2026-02-21", "usage": 5.4 }, { "date": "2026-02-22", "usage": 8.9 }, { "date": "2026-02-23", "usage": 7.6 }, { "date": "2026-02-24", "usage": 9.2 }, { "date": "2026-02-25", "usage": 6.7 }, { "date": "2026-02-26", "usage": 11.3 }, { "date": "2026-02-27", "usage": 8.4 }, { "date": "2026-02-28", "usage": 10.8 }, { "date": "2026-03-01", "usage": 7.9 },
            { "date": "2026-03-02", "usage": 6.1 }, { "date": "2026-03-03", "usage": 9.7 }, { "date": "2026-03-04", "usage": 8.3 }, { "date": "2026-03-05", "usage": 11.5 }, { "date": "2026-03-06", "usage": 7.1 }, { "date": "2026-03-07", "usage": 5.8 }, { "date": "2026-03-08", "usage": 10.2 }, { "date": "2026-03-09", "usage": 8.6 }, { "date": "2026-03-10", "usage": 6.4 }, { "date": "2026-03-11", "usage": 9.5 },
            { "date": "2026-03-12", "usage": 7.7 }
        ];

        let currentData = [...FIXED_DATA];
        let currentTab = 'monthly';

        // --- 2. 사진 분석 로직 (목함수) ---

        const mockAnalyzeImage = (files) => {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const extracted = [];
                    const today = new Date("2026-03-12"); 
                    for (let i = 0; i < files.length; i++) {
                        const date = new Date(today);
                        date.setDate(today.getDate() + i + 1);
                        extracted.push({
                            date: date.toISOString().split('T')[0],
                            usage: (Math.random() * 5 + 7).toFixed(1)
                        });
                    }
                    resolve(extracted);
                }, 1500);
            });
        };

        const analyzeBtn = document.getElementById('analyze-btn');
        const photoInput = document.getElementById('photo-input');
        const analysisResults = document.getElementById('analysis-results');

        analyzeBtn.addEventListener('click', async () => {
            if (!photoInput.files || photoInput.files.length === 0) {
                alert('분석할 사진을 먼저 선택해주세요.');
                return;
            }

            alert('임시 데이터를 사용하여 분석을 진행합니다. (OCR 목함수 작동)');
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = '이미지 분석 중...';
            analysisResults.style.display = 'block';
            analysisResults.innerHTML = `<p><strong>${photoInput.files.length}장</strong>의 사진을 분석하고 있습니다...</p>`;

            const newData = await mockAnalyzeImage(photoInput.files);
            currentData = [...currentData, ...newData];
            updateUI();

            let detailHtml = `<p style="color: #1a73e8; font-weight: bold; margin-bottom: 10px;">✅ 분석 완료 (${newData.length}건)</p>`;
            detailHtml += '<ul style="list-style: none; padding: 0; margin: 0;">';
            newData.forEach((data, index) => {
                detailHtml += `
                    <li style="padding: 5px 0; border-bottom: 1px solid #d2e3fc;">
                        사진 ${index + 1}: <span style="color: #5f6368;">${data.date}</span> ➔ <strong>${data.usage} kWh</strong>
                    </li>`;
            });
            detailHtml += '</ul>';
            
            analysisResults.innerHTML = detailHtml;
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = '사진 분석 시작';
        });

        // --- 3. UI 렌더링 및 탭 로직 ---

        const switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', 
                    (tab === 'daily' && btn.id === 'tab-daily') || 
                    (tab === 'monthly' && btn.id === 'tab-monthly')
                );
            });
            document.getElementById('list-header').innerHTML = 
                tab === 'daily' ? '<th>날짜</th><th>사용량 (kWh)</th>' : '<th>월</th><th>총 사용량 (kWh)</th>';
            
            renderUsageList();
        };

        const updateUI = () => {
            renderDailyChart();
            renderMonthlyChart();
            renderUsageList();
        };

        const drawYAxisAndGrid = (containerId, yAxisId, maxUsage) => {
            const yAxis = document.getElementById(yAxisId);
            const container = document.getElementById(containerId);
            yAxis.innerHTML = '';
            
            // 기존 그리드 라인 제거
            container.querySelectorAll('.grid-line').forEach(el => el.remove());

            // 눈금 수 계산 (최대값 기준 적절한 간격 설정)
            const step = maxUsage > 100 ? 50 : (maxUsage > 30 ? 10 : 5);
            const maxVal = Math.ceil(maxUsage / step) * step;
            const stepsCount = maxVal / step;

            for (let i = 0; i <= stepsCount; i++) {
                const val = i * step;
                const label = document.createElement('div');
                label.textContent = (i === stepsCount) ? `${val} kWh` : val;
                yAxis.appendChild(label);

                // 그리드 라인 추가
                const line = document.createElement('div');
                line.className = 'grid-line';
                const bottomPos = (val / maxVal) * 200 + 50; 
                line.style.bottom = `${bottomPos}px`;
                container.appendChild(line);
            }
            return maxVal;
        };

        const renderDailyChart = () => {
            const container = document.getElementById('daily-chart');
            const recent30 = currentData.slice(-30);
            const usages = recent30.map(d => d.usage);
            const maxUsage = Math.max(...usages);
            const minUsage = Math.min(...usages);
            
            const maxVal = drawYAxisAndGrid('daily-chart', 'daily-y-axis', maxUsage);
            container.querySelectorAll('.bar').forEach(el => el.remove());

            let lastYear = null;
            recent30.forEach((item, index) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                if (item.usage === maxUsage) bar.classList.add('max');
                if (item.usage === minUsage) bar.classList.add('min');

                const height = (item.usage / maxVal) * 200;
                bar.style.height = `${height}px`;
                bar.title = `${item.date}: ${item.usage}kWh`;
                
                // 최소/최대값 라벨 추가
                if (item.usage === maxUsage || item.usage === minUsage) {
                    const valLabel = document.createElement('div');
                    valLabel.className = 'value-label';
                    valLabel.textContent = item.usage;
                    bar.appendChild(valLabel);
                }

                const label = document.createElement('div');
                label.className = 'bar-label';
                const [y, m, d] = item.date.split('-');
                
                let labelHtml = `${m}/${d}`;
                if (index === 0 || y !== lastYear) {
                    labelHtml += `<br>${y}`;
                    lastYear = y;
                }
                
                label.innerHTML = labelHtml;
                bar.appendChild(label);
                container.appendChild(bar);
            });
            
            // 가로 스크롤을 위해 마지막 바로 스크롤
            setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 100);
        };

        const renderMonthlyChart = () => {
            const container = document.getElementById('monthly-chart');
            const monthlyMap = getMonthlyData();
            const months = Object.keys(monthlyMap).sort();
            const usages = Object.values(monthlyMap);
            const maxUsage = Math.max(...usages);
            const minUsage = Math.min(...usages);

            const maxVal = drawYAxisAndGrid('monthly-chart', 'monthly-y-axis', maxUsage);
            container.querySelectorAll('.bar').forEach(el => el.remove());

            let lastYear = null;
            months.forEach((month, index) => {
                const usage = monthlyMap[month];
                const bar = document.createElement('div');
                bar.className = 'bar';
                if (usage === maxUsage) bar.classList.add('max');
                if (usage === minUsage) bar.classList.add('min');

                const height = (usage / maxVal) * 200;
                bar.style.height = `${height}px`;
                bar.title = `${month}: ${usage.toFixed(1)}kWh`;

                if (usage === maxUsage || usage === minUsage) {
                    const valLabel = document.createElement('div');
                    valLabel.className = 'value-label';
                    valLabel.textContent = usage.toFixed(1);
                    bar.appendChild(valLabel);
                }

                const label = document.createElement('div');
                label.className = 'bar-label';
                const [y, m] = month.split('-');
                
                let labelHtml = `${m}월`;
                if (index === 0 || y !== lastYear) {
                    labelHtml += `<br>${y}`;
                    lastYear = y;
                }
                
                label.innerHTML = labelHtml;
                bar.appendChild(label);
                container.appendChild(bar);
            });
        };

        const getMonthlyData = () => {
            const monthlyMap = {};
            currentData.forEach(item => {
                const month = item.date.substring(0, 7);
                monthlyMap[month] = (monthlyMap[month] || 0) + item.usage;
            });
            return monthlyMap;
        };

        const renderUsageList = () => {
            const tbody = document.getElementById('usage-list-body');
            tbody.innerHTML = '';
            
            if (currentTab === 'daily') {
                const sortedData = [...currentData].sort((a, b) => b.date.localeCompare(a.date));
                sortedData.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${item.date}</td><td class="usage-val">${item.usage.toFixed(1)}</td>`;
                    tbody.appendChild(tr);
                });
            } else {
                const monthlyMap = getMonthlyData();
                const sortedMonths = Object.keys(monthlyMap).sort((a, b) => b.localeCompare(a));
                sortedMonths.forEach(month => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${month}</td><td class="usage-val">${monthlyMap[month].toFixed(1)}</td>`;
                    tbody.appendChild(tr);
                });
            }
        };

        updateUI();
    </script>
</body>
</html>
