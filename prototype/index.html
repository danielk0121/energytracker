<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnergyTracker Prototype</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; line-height: 1.6; color: #333; background-color: #f0f2f5; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 30px; }
        h3 { margin-top: 0; color: #202124; border-bottom: 2px solid #f1f3f4; padding-bottom: 10px; margin-bottom: 15px; }
        
        /* 업로드 섹션 */
        .upload-section { text-align: center; border: 2px dashed #dadce0; background-color: #f8f9fa; }
        input[type="file"] { display: block; width: 100%; margin: 15px 0; }
        button { background-color: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: 500; transition: background-color 0.2s; }
        button:hover { background-color: #1765cc; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        
        /* 썸네일 미리보기 */
        .thumbnail-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 15px; }
        .thumbnail { width: calc(100% / 6 - 10px); aspect-ratio: 1 / 1; border-radius: 6px; object-fit: cover; border: 1px solid #dadce0; background-color: #eee; }
        @media (max-width: 400px) { .thumbnail { width: calc(100% / 4 - 10px); } }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-apply { background-color: #34a853; flex: 2; display: none; }
        .btn-apply:hover { background-color: #2d8e47; }
        .btn-reset { background-color: #5f6368; flex: 1; display: none; }
        .btn-reset:hover { background-color: #494c50; }

        /* 분석 결과 섹션 */
        #analysis-results { min-height: 50px; background: #f8f9fa; border-radius: 8px; font-size: 14px; padding: 10px; border: 1px solid #f1f3f4; }
        .analysis-empty { color: #70757a; text-align: center; padding: 15px 0; font-style: italic; }
        .analysis-item { padding: 8px; border-bottom: 1px solid #d2e3fc; display: flex; justify-content: space-between; }
        .analysis-item:last-child { border-bottom: none; }
        .analysis-item span { color: #5f6368; }
        .analysis-item strong { color: #1a73e8; }

        /* 차트 래퍼 및 y축 */
        .chart-wrapper { display: flex; height: 280px; background: #fafafa; border-radius: 8px; padding: 10px 10px 0 10px; position: relative; margin-bottom: 10px; overflow: hidden; }
        .y-axis { display: flex; flex-direction: column-reverse; justify-content: space-between; width: 40px; padding-bottom: 50px; border-right: 1px solid #eee; font-size: 10px; color: #70757a; text-align: right; padding-right: 6px; box-sizing: border-box; line-height: 1.1; z-index: 10; background: #fafafa; }
        .chart-container { flex: 1; display: flex; align-items: flex-end; gap: 12px; padding-bottom: 50px; overflow-x: auto; overflow-y: hidden; position: relative; scroll-behavior: smooth; cursor: grab; z-index: 5; }
        .chart-container:active { cursor: grabbing; }
        
        /* 스크롤바 숨기기 */
        .chart-container::-webkit-scrollbar { display: none; }
        .chart-container { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 그리드 라인 */
        .grid-line { position: absolute; left: 50px; right: 10px; border-top: 1px dashed rgba(200, 200, 200, 0.5); z-index: 8; pointer-events: none; }

        .bar { background-color: #4285f4; border-radius: 4px 4px 0 0; min-width: 32px; position: relative; cursor: pointer; z-index: 1; transition: transform 0.2s; pointer-events: none; }
        .bar-label { position: absolute; bottom: -42px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #70757a; white-space: nowrap; text-align: center; line-height: 1.2; z-index: 3; }
        
        /* 최소/최대 강조 라벨 */
        .value-label { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: bold; white-space: nowrap; display: flex; flex-direction: column; align-items: center; z-index: 3; }
        .bar.max .value-label { color: #ea4335; }
        .bar.min .value-label { color: #34a853; }

        .monthly .bar { min-width: 50px; }
        
        /* 탭 스타일 */
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #f1f3f4; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; padding: 8px 16px; cursor: pointer; font-size: 14px; font-weight: 600; color: #5f6368; border-radius: 20px; transition: all 0.2s; width: auto; }
        .tab-btn.active { background-color: #e8f0fe; color: #1a73e8; }
        .tab-btn:hover:not(.active) { background-color: #f1f3f4; }

        /* 데이터 목록 */
        .data-list { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .data-list th, .data-list td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f3f4; }
        .data-list th { background-color: #f8f9fa; font-weight: 600; color: #5f6368; }
        .data-list tr:hover { background-color: #f1f3f4; }
        .usage-val { font-weight: bold; color: #1a73e8; }
    </style>
</head>
<body>
    <div style="background-color: #fff3cd; color: #856404; padding: 10px; text-align: center; font-size: 14px; border-bottom: 1px solid #ffeeba; margin-bottom: 20px;">
        ⚠️ 현재 샘플 데이터를 사용 중입니다. 추후 기능이 수정될 예정입니다.
    </div>
    <h1>EnergyTracker</h1>

    <!-- 1. 사진 업로드 섹션 -->
    <div class="card upload-section">
        <h3>1. 월패드 사진 업로드</h3>
        <p style="font-size: 14px; color: #5f6368;">분석할 사진을 여러 장 선택할 수 있습니다.</p>
        <input type="file" id="photo-input" accept="image/*" multiple>
        <div id="thumbnail-preview" class="thumbnail-container"></div>
        <button id="analyze-btn">사진 분석 시작</button>
    </div>

    <!-- 사진 분석 결과 섹션 -->
    <div class="card">
        <h3>사진 분석 결과</h3>
        <div id="analysis-results">
            <div class="analysis-empty">업로드된 사진이 없습니다. 분석을 시작해주세요.</div>
        </div>
        <div class="btn-group">
            <button id="apply-btn" class="btn-apply">데이터 반영하기</button>
            <button id="reset-btn" class="btn-reset">초기화</button>
        </div>
    </div>

    <!-- 2. 월별 사용량 차트 -->
    <div class="card">
        <h3>월별 사용량 (최근 13개월)</h3>
        <div id="monthly-wrapper" class="chart-wrapper">
            <div id="monthly-y-axis" class="y-axis"></div>
            <div id="monthly-chart" class="chart-container monthly"></div>
        </div>
    </div>

    <!-- 3. 일자별 사용량 차트 -->
    <div class="card">
        <h3>일자별 사용량 (최근 30일)</h3>
        <div id="daily-wrapper" class="chart-wrapper">
            <div id="daily-y-axis" class="y-axis"></div>
            <div id="daily-chart" class="chart-container"></div>
        </div>
    </div>

    <!-- 4. 상세 사용 기록 -->
    <div class="card">
        <h3>상세 사용 기록</h3>
        <div class="tabs">
            <button id="tab-monthly" class="tab-btn active" onclick="switchTab('monthly')">월별 목록</button>
            <button id="tab-daily" class="tab-btn" onclick="switchTab('daily')">일자별 목록</button>
        </div>
        <table class="data-list">
            <thead>
                <tr id="list-header">
                    <th>월</th>
                    <th>총 사용량 (kWh)</th>
                </tr>
            </thead>
            <tbody id="usage-list-body">
                <!-- 목록이 여기에 생성됩니다 -->
            </tbody>
        </table>
    </div>

    <script>
        // --- 1. 데이터 생성 및 관리 ---
        
        const generate13MonthsData = () => {
            const data = [];
            const endDate = new Date("2026-03-12");
            const startDate = new Date("2025-02-01");
            let seed = 12345;
            const pseudoRandom = () => {
                seed = (seed * 9301 + 49297) % 233280;
                return seed / 233280;
            };

            for (let d = new Date(startDate); d <= endDate; d.setDate(d.getDate() + 1)) {
                const month = d.getMonth();
                let seasonalBoost = 0;
                if (month === 6 || month === 7) seasonalBoost = 5;
                if (month === 11 || month === 0) seasonalBoost = 4;
                const usage = parseFloat((pseudoRandom() * 6 + 4 + seasonalBoost).toFixed(1));
                data.push({
                    date: d.toISOString().split('T')[0],
                    usage: usage
                });
            }
            return data;
        };

        const FIXED_DATA = generate13MonthsData();
        let currentData = [...FIXED_DATA];
        let pendingData = []; 
        let currentTab = 'monthly';

        // --- 2. 사진 업로드 및 분석 로직 ---

        const photoInput = document.getElementById('photo-input');
        const thumbnailPreview = document.getElementById('thumbnail-preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const applyBtn = document.getElementById('apply-btn');
        const resetBtn = document.getElementById('reset-btn');
        const analysisResults = document.getElementById('analysis-results');

        photoInput.addEventListener('change', (e) => {
            thumbnailPreview.innerHTML = '';
            if (e.target.files && e.target.files.length > 0) {
                Array.from(e.target.files).forEach(file => {
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    img.className = 'thumbnail';
                    img.onload = () => URL.revokeObjectURL(img.src);
                    thumbnailPreview.appendChild(img);
                });
                resetBtn.style.display = 'block';
            }
        });

        const mockAnalyzeImage = (files) => {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const extracted = [];
                    const baseDate = new Date("2026-03-12"); 
                    let dayOffset = 1;

                    for (let i = 0; i < files.length; i++) {
                        let dataCount = (i === 0) ? 3 : (i === 1 ? 2 : 1);
                        for (let j = 0; j < dataCount; j++) {
                            const date = new Date(baseDate);
                            date.setDate(baseDate.getDate() + dayOffset++);
                            extracted.push({
                                photoIndex: i + 1,
                                date: date.toISOString().split('T')[0],
                                usage: parseFloat((Math.random() * 5 + 7).toFixed(1))
                            });
                        }
                    }
                    resolve(extracted);
                }, 1500);
            });
        };

        analyzeBtn.addEventListener('click', async () => {
            if (!photoInput.files || photoInput.files.length === 0) {
                alert('분석할 사진을 먼저 선택해주세요.');
                return;
            }

            alert('임시 데이터를 사용하여 분석을 진행합니다. (OCR 목함수 작동)');
            analyzeBtn.disabled = true;
            analyzeBtn.textContent = '이미지 분석 중...';
            applyBtn.style.display = 'none';
            resetBtn.style.display = 'block';
            analysisResults.innerHTML = `<div class="analysis-empty"><strong>${photoInput.files.length}장</strong>의 사진을 분석하고 있습니다...</div>`;

            pendingData = await mockAnalyzeImage(photoInput.files);
            
            let detailHtml = `<p style="color: #1a73e8; font-weight: bold; margin-bottom: 10px;">✅ 분석 완료 (${pendingData.length}건)</p>`;
            pendingData.forEach((data) => {
                detailHtml += `
                    <div class="analysis-item">
                        <span>사진 ${data.photoIndex}: ${data.date}</span>
                        <strong>${data.usage} kWh</strong>
                    </div>`;
            });
            
            analysisResults.innerHTML = detailHtml;
            analyzeBtn.disabled = false;
            analyzeBtn.textContent = '사진 분석 시작';
            applyBtn.style.display = 'block'; 
        });

        applyBtn.addEventListener('click', () => {
            if (pendingData.length === 0) return;
            currentData = [...currentData, ...pendingData];
            updateUI();
            alert(`${pendingData.length}건의 데이터가 차트와 목록에 반영되었습니다.`);
            // 데이터 반영 후에도 결과는 유지하되, 버튼 상태만 조정할 수 있으나 
            // 여기서는 요청에 따라 초기화하지 않고 유지합니다.
            applyBtn.disabled = true;
            applyBtn.textContent = '반영 완료';
        });

        resetBtn.addEventListener('click', () => {
            if (!confirm('업로드된 사진과 분석 결과를 초기화하시겠습니까?')) return;
            
            photoInput.value = '';
            thumbnailPreview.innerHTML = '';
            analysisResults.innerHTML = `<div class="analysis-empty">업로드된 사진이 없습니다. 분석을 시작해주세요.</div>`;
            pendingData = [];
            applyBtn.style.display = 'none';
            applyBtn.disabled = false;
            applyBtn.textContent = '데이터 반영하기';
            resetBtn.style.display = 'none';
        });

        // --- 3. UI 렌더링 및 탭 로직 ---

        const switchTab = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', 
                    (tab === 'daily' && btn.id === 'tab-daily') || 
                    (tab === 'monthly' && btn.id === 'tab-monthly')
                );
            });
            document.getElementById('list-header').innerHTML = 
                tab === 'daily' ? '<th>날짜</th><th>사용량 (kWh)</th>' : '<th>월</th><th>총 사용량 (kWh)</th>';
            
            renderUsageList();
        };

        const updateUI = () => {
            renderDailyChart();
            renderMonthlyChart();
            renderUsageList();
        };

        const drawYAxisAndGrid = (wrapperId, yAxisId, maxUsage) => {
            const yAxis = document.getElementById(yAxisId);
            const wrapper = document.getElementById(wrapperId);
            yAxis.innerHTML = '';
            wrapper.querySelectorAll('.grid-line').forEach(el => el.remove());

            const step = maxUsage > 100 ? 50 : (maxUsage > 30 ? 10 : 2);
            const maxVal = Math.ceil(maxUsage / step) * step;
            const stepsCount = maxVal / step;

            for (let i = 0; i <= stepsCount; i++) {
                const val = i * step;
                const label = document.createElement('div');
                label.innerHTML = (i === stepsCount) ? `${val}<br>(kWh)` : val;
                yAxis.appendChild(label);

                const line = document.createElement('div');
                line.className = 'grid-line';
                const bottomPos = (val / maxVal) * 200 + 50; 
                line.style.bottom = `${bottomPos}px`;
                wrapper.appendChild(line);
            }
            return maxVal;
        };

        const setupDragScroll = (containerId) => {
            const slider = document.getElementById(containerId);
            let isDown = false;
            let startX;
            let scrollLeft;

            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                slider.classList.add('active');
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
                slider.style.scrollBehavior = 'auto';
            });
            slider.addEventListener('mouseleave', () => {
                isDown = false;
                slider.classList.remove('active');
            });
            slider.addEventListener('mouseup', () => {
                isDown = false;
                slider.classList.remove('active');
                slider.style.scrollBehavior = 'smooth';
            });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2; 
                slider.scrollLeft = scrollLeft - walk;
            });
        };

        const renderDailyChart = () => {
            const container = document.getElementById('daily-chart');
            const recent30 = currentData.slice(-30);
            const usages = recent30.map(d => d.usage);
            const maxUsage = Math.max(...usages);
            const minUsage = Math.min(...usages);
            
            const maxVal = drawYAxisAndGrid('daily-wrapper', 'daily-y-axis', maxUsage);
            container.querySelectorAll('.bar').forEach(el => el.remove());

            let lastYear = null;
            recent30.forEach((item, index) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                if (item.usage === maxUsage) bar.classList.add('max');
                if (item.usage === minUsage) bar.classList.add('min');

                const height = (item.usage / maxVal) * 200;
                bar.style.height = `${height}px`;
                bar.title = `${item.date}: ${item.usage}kWh`;
                
                if (item.usage === maxUsage || item.usage === minUsage) {
                    const valLabel = document.createElement('div');
                    valLabel.className = 'value-label';
                    valLabel.innerHTML = `<span>${item.usage}</span>`;
                    bar.appendChild(valLabel);
                }

                const label = document.createElement('div');
                label.className = 'bar-label';
                const [y, m, d] = item.date.split('-');
                let labelHtml = `${m}/${d}`;
                if (index === 0 || y !== lastYear) {
                    labelHtml += `<br>${y}`;
                    lastYear = y;
                }
                label.innerHTML = labelHtml;
                bar.appendChild(label);
                container.appendChild(bar);
            });
            setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 100);
        };

        const renderMonthlyChart = () => {
            const container = document.getElementById('monthly-chart');
            const monthlyMap = getMonthlyData();
            const months = Object.keys(monthlyMap).sort();
            const usages = Object.values(monthlyMap);
            const maxUsage = Math.max(...usages);
            const minUsage = Math.min(...usages);

            const maxVal = drawYAxisAndGrid('monthly-wrapper', 'monthly-y-axis', maxUsage);
            container.querySelectorAll('.bar').forEach(el => el.remove());

            months.forEach((month) => {
                const usage = monthlyMap[month];
                const bar = document.createElement('div');
                bar.className = 'bar';
                if (usage === maxUsage) bar.classList.add('max');
                if (usage === minUsage) bar.classList.add('min');

                const height = (usage / maxVal) * 200;
                bar.style.height = `${height}px`;
                bar.title = `${month}: ${usage.toFixed(1)}kWh`;

                if (usage === maxUsage || usage === minUsage) {
                    const valLabel = document.createElement('div');
                    valLabel.className = 'value-label';
                    valLabel.innerHTML = `<span>${usage.toFixed(1)}</span>`;
                    bar.appendChild(valLabel);
                }

                const label = document.createElement('div');
                label.className = 'bar-label';
                const [y, m] = month.split('-');
                label.innerHTML = `${m}월<br>${y}`;
                bar.appendChild(label);
                container.appendChild(bar);
            });
            setTimeout(() => { container.scrollLeft = container.scrollWidth; }, 100);
        };

        const getMonthlyData = () => {
            const monthlyMap = {};
            currentData.forEach(item => {
                const month = item.date.substring(0, 7);
                monthlyMap[month] = (monthlyMap[month] || 0) + item.usage;
            });
            return monthlyMap;
        };

        const renderUsageList = () => {
            const tbody = document.getElementById('usage-list-body');
            tbody.innerHTML = '';
            if (currentTab === 'daily') {
                const sortedData = [...currentData].sort((a, b) => b.date.localeCompare(a.date));
                sortedData.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${item.date}</td><td class="usage-val">${item.usage.toFixed(1)}</td>`;
                    tbody.appendChild(tr);
                });
            } else {
                const monthlyMap = getMonthlyData();
                const sortedMonths = Object.keys(monthlyMap).sort((a, b) => b.localeCompare(a));
                sortedMonths.forEach(month => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${month}</td><td class="usage-val">${monthlyMap[month].toFixed(1)}</td>`;
                    tbody.appendChild(tr);
                });
            }
        };

        updateUI();
        setupDragScroll('daily-chart');
        setupDragScroll('monthly-chart');
    </script>
</body>
</html>
